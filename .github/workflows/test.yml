name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: preflight
          POSTGRES_PASSWORD: preflight
          POSTGRES_DB: preflight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U preflight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://preflight:preflight@localhost:5432/preflight
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: test-key-not-used-in-ci
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: lint
        run: ruff check preflight tests

      - name: migrate
        run: alembic upgrade head

      - name: pytest
        run: pytest --cov=preflight --cov-report=term-missing -q

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build
