name: calibration

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"  # nightly at 06:17 UTC
  workflow_dispatch:

jobs:
  calibrate:
    name: synthetic-response F1 sweep
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: preflight
          POSTGRES_PASSWORD: preflight
          POSTGRES_DB: preflight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U preflight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://preflight:preflight@localhost:5432/preflight
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: test-key-not-used-in-ci
      LOG_LEVEL: WARNING
      GIT_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: migrate
        run: alembic upgrade head

      - name: calibrate
        run: |
          python -m preflight.cli calibrate \
            --n-clean 12 \
            --n-personas 200 \
            --n-sub-swarm 60 \
            --seed 7 \
            --out calibration_summary.json

      - name: summarize
        run: |
          echo "## Calibration F1" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('calibration_summary.json'))
          print(f\"**Overall macro F1:** {d['overall_macro_f1']:.4f}\")
          print()
          print('| Defect class | Precision | Recall | F1 |')
          print('|---|---|---|---|')
          for cls, m in d['per_class'].items():
              print(f\"| {cls} | {m['precision']:.3f} | {m['recall']:.3f} | {m['f1']:.3f} |\")
          " >> "$GITHUB_STEP_SUMMARY"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calibration-summary-${{ github.sha }}
          path: calibration_summary.json
          retention-days: 90
